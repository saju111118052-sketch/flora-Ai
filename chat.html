<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora AI 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007f; --dark: #090212; --light-bg: #f8f9fa; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark); height: 100dvh; display: flex; flex-direction: column; }

        /* Login Screen */
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(255,0,127,0.3); }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .login-card button { background: var(--pink); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }

        /* Main Layout - Responsive */
        .app-container { display: flex; height: 100%; overflow: hidden; }
        
        /* Sidebar: Hidden on mobile by default, toggleable or compact */
        .sidebar { width: 260px; background: #0d0d1a; color: white; padding: 20px; display: flex; flex-direction: column; transition: 0.3s; }
        @media (max-width: 768px) { .sidebar { display: none; } } /* Mobile-এ সাইডবার হাইড থাকবে */

        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; }
        
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; background: white; }
        .chibi-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--pink); }

        /* Chat Area */
        #chatBox { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: var(--light-bg); }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; animation: fadeIn 0.3s; }
        .user-msg { align-self: flex-end; background: var(--pink); color: white; border-bottom-right-radius: 2px; }
        .flora-msg { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 3px solid var(--pink); }

        /* Input Area */
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input#userInput { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { background: var(--pink); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="color:var(--pink); margin-top:0;">Flora AI 🌸</h2>
            <input type="text" id="userName" placeholder="Your Name">
            <input type="email" id="userEmail" placeholder="Your Email">
            <button onclick="startApp()">Start Chatting</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <h3 style="color:var(--pink);">Flora AI</h3>
            <p style="font-size:10px; color:#888;">Developer: Tahosin Islam Feeha</p>
            <div id="profileInfo" style="margin-top:auto; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                <div id="sideName" style="font-size:12px; font-weight:600;"></div>
                <div id="limitText" style="font-size:10px; color:var(--pink); margin-top:5px;">Limit: 0/20</div>
            </div>
            <button onclick="clearHistory()" style="margin-top:10px; background:none; border:1px solid #444; color:#888; cursor:pointer; font-size:10px; padding:5px; border-radius:5px;">Clear Memory</button>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <img src="flora_chibi.png" alt="Flora" class="chibi-img">
                <div><strong style="font-size:14px;">Flora AI</strong><br><small style="color:green;">● Active Memory</small></div>
            </div>
            <div id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let history = JSON.parse(localStorage.getItem('flora_history')) || [];
        let userData = JSON.parse(localStorage.getItem('flora_user')) || null;

        window.onload = () => {
            if(userData) {
                document.getElementById('loginOverlay').style.display = 'none';
                renderHistory();
                updateSidebar();
            }
        };

        function startApp() {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            if(!name || !email) return alert("Fill all!");
            
            userData = { name, email, count: 0 };
            localStorage.setItem('flora_user', JSON.stringify(userData));
            document.getElementById('loginOverlay').style.display = 'none';
            updateSidebar();
            addMessage("flora", `Hi ${name}! I will remember our chat from now on. 🌸`);
        }

        function addMessage(sender, text, save = true) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${sender}-msg`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            if(save) {
                history.push({ sender, text });
                localStorage.setItem('flora_history', JSON.stringify(history));
            }
        }

        function renderHistory() {
            history.forEach(m => addMessage(m.sender, m.text, false));
        }

        function updateSidebar() {
            document.getElementById('sideName').innerText = userData.name;
            document.getElementById('limitText').innerText = `Limit: ${userData.count}/20`;
        }

        function clearHistory() {
            localStorage.clear();
            location.reload();
        }

        async function sendMessage() {
            if(userData.count >= 20) return addMessage("flora", "Daily limit reached!");
            
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            addMessage("user", text);
            input.value = "";
            userData.count++;
            localStorage.setItem('flora_user', JSON.stringify(userData));
            updateSidebar();

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-exp:free",
                        "messages": [
                            { "role": "system", "content": `You are Flora, created by Tahosin Islam Feeha. User name is ${userData.name}. Always remember this name.` },
                            ...history.slice(-6).map(m => ({ "role": m.sender === 'flora' ? 'assistant' : 'user', "content": m.text })),
                            { "role": "user", "content": text }
                        ]
                    })
                });
                const data = await response.json();
                addMessage("flora", data.choices[0].message.content);
            } catch {
                addMessage("flora", "Error connecting... 🌸");
            }
        }
    </script>
</body>
</html>
