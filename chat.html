<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora AI - Your Smart Bestie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-pink: #ff007f; --bg-gradient: linear-gradient(135deg, #ff007f 0%, #ff69b4 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-gradient); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-card h2 { color: var(--main-pink); margin-bottom: 20px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; outline: none; background: #f9f9f9; }
        .login-card button { background: var(--main-pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; }
        .app-container { width: 100%; height: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; position: relative; }
        .header { background: var(--bg-gradient); padding: 50px 20px 20px; border-radius: 0 0 30px 30px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .flora-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; background: white; object-fit: cover; }
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--main-pink); color: white; border-bottom-right-radius: 5px; }
        .flora-msg { align-self: flex-start; background: #f1f1f1; color: #333; border-bottom-left-radius: 5px; }
        .input-area { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #userInput { flex: 1; border: none; background: #f1f1f1; padding: 12px 20px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--main-pink); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Flora AI 🌸</h2>
        <input id="userName" placeholder="Enter Name">
        <input id="userEmail" placeholder="Enter Email">
        <button onclick="startApp()">Enter Chat</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <img src="flora_chibi.png" class="flora-avatar" alt="Flora">
            <div>
                <strong>Flora AI</strong><br>
                <small>Online | Smart Mode</small>
            </div>
        </div>
        <div style="cursor: pointer;"><i class="fas fa-ellipsis-h"></i></div>
    </div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input id="userInput" placeholder="Ask Flora anything..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const encodedKey = "c2stb3ItdjEtYmU2MjU2MzNiNWQ2ODFiY2EwZWVlMjg1MTNiMmE0YWJkYzk1YTE4MzMyNzY2NGJkNWI4OGExN2E5YTk1N2FhNw==";
    const API_KEY = atob(encodedKey).trim();
    let chatHistory = [];
    let name = "User";

    function startApp() {
        name = document.getElementById("userName").value.trim() || "Feeha";
        document.getElementById("loginOverlay").style.display = "none";
        addMessage("flora", `Hi ${name}! I'm Flora 🌸. How can I help you today?`);
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = "msg " + sender + "-msg";
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        chatHistory.push({ role: (sender === "flora" ? "assistant" : "user"), content: text });
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        input.value = "";

        const typingDiv = document.createElement("div");
        typingDiv.className = "msg flora-msg";
        typingDiv.id = "typing";
        typingDiv.innerText = "Flora is typing...";
        document.getElementById("chatBox").appendChild(typingDiv);
        document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://github.com/flora-ai",
                    "X-Title": "Flora AI"
                },
                body: JSON.stringify({
                    "model": "meta-llama/llama-3.2-3b-instruct:free",
                    "messages": [
                        { "role": "system", "content": `You are Flora, a smart and cheerful bestie for ${name}. Talk like a close friend.` },
                        ...chatHistory.slice(-10)
                    ]
                })
            });

            const data = await response.json();
            const indicator = document.getElementById("typing");
            if(indicator) indicator.remove();

            if (data.choices && data.choices[0] && data.choices[0].message) {
                addMessage("flora", data.choices[0].message.content);
            } else {
                addMessage("flora", "Sorry bestie, my brain just glitched! Try again? 🌸");
            }
        } catch (e) {
            const indicator = document.getElementById("typing");
            if(indicator) indicator.remove();
            addMessage("flora", "Network error! Is the internet okay? 🌐");
        }
    }
</script>
</body>
</html>
