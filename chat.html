<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora AI - Your Smart Bestie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-pink: #ff007f; --bg-gradient: linear-gradient(135deg, #ff007f 0%, #ff69b4 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Login Screen */
        #loginOverlay { position: fixed; inset: 0; background: var(--bg-gradient); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; transition: 0.5s; opacity: 1; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-card h2 { color: var(--main-pink); margin-bottom: 20px; font-weight: 600; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 15px; outline: none; background: #f9f9f9; }
        .login-card button { background: var(--main-pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(255,0,127,0.2); }

        /* Main App Layout */
        .app-container { width: 100%; height: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header { background: var(--bg-gradient); padding: 50px 20px 20px; border-radius: 0 0 30px 30px; display: flex; align-items: center; justify-content: space-between; color: white; position: relative; z-index: 10; }
        .header-info { display: flex; align-items: center; gap: 12px; }
        .flora-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; background: white; object-fit: cover; }
        .header-text strong { display: block; font-size: 18px; }
        .header-text span { font-size: 11px; opacity: 0.9; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 7px; height: 7px; background: #00ff00; border-radius: 50%; display: inline-block; }
        .menu-btn { font-size: 20px; cursor: pointer; padding: 5px; }

        /* Message Area */
        #chatBox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fff; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--main-pink); color: white; border-bottom-right-radius: 5px; }
        .flora-msg { align-self: flex-start; background: #f1f1f1; color: #333; border-bottom-left-radius: 5px; border: 1px solid #eee; }

        /* Input Area */
        .input-area { padding: 20px; background: white; display: flex; align-items: center; gap: 10px; border-top: 1px solid #f5f5f5; }
        .input-wrapper { flex: 1; background: #f1f1f1; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        #userInput { flex: 1; border: none; background: transparent; padding: 10px; outline: none; font-size: 14px; }
        .send-btn { background: var(--main-pink); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }

        /* Menu */
        #menuOverlay { position: absolute; top: 90px; right: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; z-index: 1000; width: 180px; border: 1px solid #eee; }
        .menu-item { padding: 12px 15px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #333; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Flora AI 🌸</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Your Global Smart Bestie</p>
        <input id="userName" placeholder="Enter your name">
        <input id="userEmail" placeholder="Enter your email">
        <button onclick="startApp()">Enter Chat</button>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div class="header-info">
            <i class="fas fa-chevron-left"></i>
            <img src="https://ui-avatars.com/api/?name=Flora&background=ff007f&color=fff" class="flora-avatar" alt="Flora">
            <div class="header-text">
                <strong>Flora AI</strong>
                <span><div class="status-dot"></div> Online | Smart Mode</span>
            </div>
        </div>
        <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-ellipsis-h"></i></div>
        
        <div id="menuOverlay">
            <div class="menu-item" onclick="location.reload()"><i class="fas fa-plus"></i> New Chat</div>
            <div class="menu-item" onclick="changeEmail()"><i class="fas fa-envelope"></i> Change Email</div>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input id="userInput" placeholder="Ask Flora anything..." onkeypress="if(event.key==='Enter')sendMessage()">
        </div>
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const secretKey = "c2stb3ItdjEtYmU2MjU2MzNiNWQ2ODFiY2EwZWVlMjg1MTNiMmE0YWJkYzk1YTE4MzMyNzY2NGJkNWI4OGExN2E5YTk1N2FhNw==";
    const API_KEY = atob(secretKey).trim(); 

    let chatHistory = [];
    let userData = { name: "User", email: "" };

    function startApp() {
        const nameInput = document.getElementById("userName").value.trim();
        const emailInput = document.getElementById("userEmail").value.trim();
        
        if(!nameInput || !emailInput) { 
            alert("Please enter Name and Email!"); 
            return; 
        }
        
        userData.name = nameInput;
        userData.email = emailInput;
        
        document.getElementById("loginOverlay").style.display = "none";
        addMessage("flora", `Hi ${userData.name}! I'm Flora 🌸. How can I help you?`);
    }

    function toggleMenu() {
        const menu = document.getElementById("menuOverlay");
        menu.style.display = (menu.style.display === "block") ? "none" : "block";
    }

    function addMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = `msg ${sender}-msg`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        chatHistory.push({ 
            role: sender === "flora" ? "assistant" : "user", 
            content: text 
        });
    }

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMessage("user", text);
        input.value = "";
        
        const chatBox = document.getElementById("chatBox");
        const typingDiv = document.createElement("div");
        typingDiv.className = "msg flora-msg";
        typingDiv.id = "typing-indicator";
        typingDiv.innerText = "Flora is typing...";
        chatBox.appendChild(typingDiv);

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY,
                    "HTTP-Referer": "https://saju111118052-sketch.github.io/flora-ai/",
                    "X-Title": "Flora AI",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "meta-llama/llama-3.2-3b-instruct:free",
                    "messages": [
                        { "role": "system", "content": `You are Flora AI. User: ${userData.name}` },
                        ...chatHistory.slice(-5)
                    ]
                })
            });

            const data = await response.json();
            document.getElementById("typing-indicator").remove();

            if (data.choices && data.choices[0]) {
                addMessage("flora", data.choices[0].message.content);
            }
        } catch (error) {
            document.getElementById("typing-indicator").remove();
            addMessage("flora", "Error connecting to server.");
        }
    }

    function changeEmail() { 
        const newEmail = prompt("New email:"); 
        if(newEmail) userData.email = newEmail; 
        toggleMenu(); 
    }
</script>
</body>
</html>
