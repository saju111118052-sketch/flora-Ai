<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora AI - Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --g: linear-gradient(135deg, #ff007f 0%, #ff69b4 100%); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #login { position: fixed; inset: 0; background: var(--g); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 35px; border-radius: 25px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card button { background: var(--p); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 15px; }
        .app { width: 100%; height: 100%; max-width: 500px; background: white; display: flex; flex-direction: column; }
        .header { background: var(--g); padding: 50px 20px 20px; color: white; border-radius: 0 0 20px 20px; text-align: center; font-weight: 600; }
        #box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .m { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .u { align-self: flex-end; background: var(--p); color: white; border-bottom-right-radius: 2px; }
        .f { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 2px; }
        .in-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #msg { flex: 1; border: none; background: #f5f5f5; padding: 12px 20px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

<div id="login">
    <div class="card">
        <h2>Flora AI</h2>
        <input id="nick" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px;" placeholder="Nickname">
        <button onclick="go()">Start Chat</button>
    </div>
</div>

<div class="app">
    <div class="header">Flora AI</div>
    <div id="box"></div>
    <div class="in-area">
        <input id="msg" placeholder="Type here..." onkeypress="if(event.key==='Enter')talk()">
    </div>
</div>

<script>
    // Double-Layer Hidden Key Protection
    const _v1 = "cGJXUXdnOThmNFAzeihiM3BibEhRTHg4Rk5ZRUYzYmRnd0ZJV3Y4N29IUjJSNkJobjRXNFdYVl9rc2c=";

    function _auth() {
        // Step 1: Base64 decode, Step 2: Reverse the string to get original GSK key
        return atob(_v1).split("").reverse().join("");
    }

    let h = [];
    function go() {
        document.getElementById("login").style.display = "none";
        add("flora", "Flora is now 100% online and secure!");
    }

    function add(s, t) {
        const b = document.getElementById("box");
        const d = document.createElement("div");
        d.className = "m " + (s === "flora" ? "f" : "u");
        d.innerText = t;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
        h.push({ role: (s === "flora" ? "assistant" : "user"), content: t });
    }

    async function talk() {
        const i = document.getElementById("msg");
        const t = i.value.trim();
        if (!t) return;
        add("user", t);
        i.value = "";
        
        const l = document.createElement("div");
        l.className = "m f"; l.id = "ld"; l.innerText = "...";
        document.getElementById("box").appendChild(l);

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + _auth(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": "llama-3.1-8b-instant",
                    "messages": [{ "role": "system", "content": "You are Flora." }, ...h.slice(-6)]
                })
            });
            const d = await r.json();
            document.getElementById("ld").remove();
            if (d.choices) add("flora", d.choices[0].message.content);
            else add("flora", "Authentication Error. Key might be revoked.");
        } catch (e) {
            if(document.getElementById("ld")) document.getElementById("ld").remove();
            add("flora", "Network error!");
        }
    }
</script>
</body>
</html>
